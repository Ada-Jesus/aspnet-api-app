# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
#  Shell scripts live in: infra/scripts/
#  Terraform lives in:    infra/terraform/
#
# ── REQUIRED GITHUB SECRETS ─────────────────────────────────────
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# ── REQUIRED GITHUB VARIABLES (Settings → Variables) ────────────
#   AWS_REGION          e.g. us-east-1
#   AWS_ACCOUNT_ID      e.g. 123456789012
#   ECR_REPOSITORY      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/aspnet-api-production
#   ECS_CLUSTER         e.g. aspnet-api-production
#   BLUE_SERVICE        e.g. aspnet-api-production-blue
#   GREEN_SERVICE       e.g. aspnet-api-production-green
#   BLUE_TG_ARN         arn:aws:elasticloadbalancing:...
#   GREEN_TG_ARN        arn:aws:elasticloadbalancing:...
#   ALB_LISTENER_ARN    arn:aws:elasticloadbalancing:...
#   TEST_LISTENER_ARN   arn:aws:elasticloadbalancing:...
#   ALB_DNS_NAME        e.g. aspnet-api-production-alb-123.us-east-1.elb.amazonaws.com
#   ALB_ARN_SUFFIX      e.g. app/aspnet-api-production-alb/abc123  (from terraform output)
#   DESIRED_COUNT       e.g. 2
# ══════════════════════
# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Blue/Green deployment with proper service selection
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Stable Blue/Green ECS deployment pipeline

name: 🚀 ASP.NET API CI/CD - Stable Blue/Green

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: aspnet-api-production
  ECS_CLUSTER: aspnet-api-production
  BLUE_SERVICE: aspnet-api-production-blue
  GREEN_SERVICE: aspnet-api-production-green


jobs:

# ───────────────────────── BUILD ─────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.x"

    - run: dotnet restore
    - run: dotnet build -c Release --no-restore
    - run: dotnet test -c Release --no-build


# ───────────────────────── DOCKER ─────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build

    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - uses: aws-actions/amazon-ecr-login@v2

    - name: Build + Push Image
      id: push
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

        IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

        docker build -t $IMAGE_URI .
        docker push $IMAGE_URI

        echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT


# ───────────────────────── DEPLOY ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ───────── PASS VALUES SAFELY ─────────
    - name: Export variables
      run: |
        echo "IMAGE_URI=${{ needs.docker.outputs.image }}" >> $GITHUB_ENV
        echo "ECS_CLUSTER=${{ env.ECS_CLUSTER }}" >> $GITHUB_ENV
        echo "BLUE_SERVICE=${{ env.BLUE_SERVICE }}" >> $GITHUB_ENV
        echo "GREEN_SERVICE=${{ env.GREEN_SERVICE }}" >> $GITHUB_ENV

    # ───────── FETCH ALB + TG FROM AWS (FIXED) ─────────
    - name: Fetch AWS resources
      run: |
        echo "ALB_DNS_NAME=$(aws elbv2 describe-load-balancers \
          --names aspnet-api-production-alb \
          --query 'LoadBalancers[0].DNSName' \
          --output text)" >> $GITHUB_ENV

        BLUE_TG=$(aws elbv2 describe-target-groups \
          --names aspnet-api-production-blue-tg \
          --query 'TargetGroups[0].TargetGroupArn' \
          --output text)

        GREEN_TG=$(aws elbv2 describe-target-groups \
          --names aspnet-api-production-green-tg \
          --query 'TargetGroups[0].TargetGroupArn' \
          --output text)

        echo "BLUE_TG_ARN=$BLUE_TG" >> $GITHUB_ENV
        echo "GREEN_TG_ARN=$GREEN_TG" >> $GITHUB_ENV

    # ───────── RUN DEPLOY SCRIPT ─────────
    - name: Deploy ECS
      run: |
        chmod +x infra/scripts/deploy.sh

        export IMAGE_URI=$IMAGE_URI
        export ECS_CLUSTER=$ECS_CLUSTER
        export BLUE_SERVICE=$BLUE_SERVICE
        export GREEN_SERVICE=$GREEN_SERVICE
        export ALB_DNS_NAME=$ALB_DNS_NAME
        export ALB_LISTENER_ARN=$ALB_LISTENER_ARN
        export DEPLOY_TG_ARN=$GREEN_TG_ARN

        bash infra/scripts/deploy.sh